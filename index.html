<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>O Quintal na Brasa - Sistema de Pedidos</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
:root{
  --fogo:#C0392B;--fogo2:#E74C3C;--dourado:#D4A017;--dourado2:#F0C040;
  --escuro:#1A0A00;--medio:#3D1A00;--claro:#FFF3E0;--superficie:#2A1000;
  --texto:#FFF3E0;--muted:#D4A017;--card:#3D1A00;--border:#5A2D00;
}
body{background:var(--escuro);color:var(--texto);min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--escuro)}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:var(--escuro)}
.logo-area{text-align:center;margin-bottom:2rem}
.logo-icon{font-size:56px;margin-bottom:.5rem}
.logo-title{font-size:26px;font-weight:700;color:var(--dourado2);letter-spacing:1px}
.logo-sub{font-size:13px;color:var(--muted);margin-top:4px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:100%;max-width:340px}
.login-title{font-size:15px;color:var(--muted);margin-bottom:1.2rem;text-align:center;font-weight:500}
.role-btn{width:100%;padding:14px 16px;margin-bottom:10px;background:var(--superficie);border:1px solid var(--border);border-radius:12px;color:var(--texto);font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s}
.role-btn:hover{background:var(--medio);border-color:var(--dourado)}
.role-btn .ricon{font-size:22px;width:34px;min-width:34px;text-align:center;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.role-btn .rinfo{text-align:left}
.role-btn .rname{font-size:15px;font-weight:600;display:block}
.role-btn .rdesc{font-size:12px;color:var(--muted);margin-top:2px;display:block}
.pin-section{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.pin-label{font-size:13px;color:var(--muted);margin-bottom:8px;text-align:center}
.pin-input{width:100%;padding:12px;background:var(--superficie);border:1px solid var(--border);border-radius:10px;color:var(--texto);font-size:20px;text-align:center;letter-spacing:8px;outline:none}
.pin-input:focus{border-color:var(--dourado)}
.btn-entrar{width:100%;padding:13px;background:var(--fogo);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;transition:background .2s}
.btn-entrar:hover{background:var(--fogo2)}
.nome-input{width:100%;padding:12px;background:var(--superficie);border:1px solid var(--border);border-radius:10px;color:var(--texto);font-size:15px;outline:none;margin-bottom:8px}
.nome-input:focus{border-color:var(--dourado)}
.nome-input::placeholder{color:#7a5030}
.header{background:var(--medio);border-bottom:2px solid var(--dourado);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.header-icon{font-size:24px}
.header-title{font-size:16px;font-weight:700;color:var(--dourado2)}
.header-sub{font-size:12px;color:var(--muted)}
.btn-sair{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 12px;font-size:12px;cursor:pointer}
.btn-sair:hover{border-color:var(--fogo);color:var(--fogo)}
.tabs{display:flex;background:var(--superficie);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;transition:.2s}
.tab.active{color:var(--dourado2);border-bottom:2px solid var(--dourado2);margin-bottom:-1px}
.tab:hover{color:var(--texto)}
.content{padding:16px}
.section-title{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.cat-btn{display:inline-block;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--superficie);color:var(--muted);cursor:pointer;margin:0 4px 8px 0}
.cat-btn.active{background:var(--fogo);border-color:var(--fogo);color:#fff}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.item-emoji{font-size:28px;width:38px;text-align:center;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:600;color:var(--texto)}
.item-desc{font-size:11px;color:var(--muted);margin-top:2px}
.item-price{font-size:14px;font-weight:700;color:var(--dourado2);margin-top:4px}
.item-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ctrl-btn{background:var(--superficie);border:1px solid var(--border);border-radius:8px;color:var(--texto);font-size:18px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:.2s;line-height:1}
.ctrl-btn.add{background:var(--fogo);border-color:var(--fogo);color:#fff}
.ctrl-btn.add:hover{background:var(--fogo2)}
.ctrl-btn.rem:hover{border-color:var(--fogo);color:var(--fogo)}
.ctrl-qty{font-size:15px;font-weight:700;color:var(--dourado2);min-width:20px;text-align:center}
.total-bar{background:var(--medio);border-top:2px solid var(--dourado);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.total-bar-info{display:flex;flex-direction:column}
.total-bar-label{font-size:11px;color:var(--muted)}
.total-bar-valor{font-size:20px;font-weight:700;color:var(--dourado2)}
.total-bar-itens{font-size:11px;color:var(--muted)}
.btn-ver-comanda{background:var(--fogo);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:10px 16px;cursor:pointer;white-space:nowrap}
.btn-ver-comanda:hover{background:var(--fogo2)}
.comanda-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.comanda-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.comanda-nome{font-size:15px;font-weight:600;color:var(--texto)}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-aguard{background:#4A3000;color:var(--dourado2)}
.badge-fazendo{background:#4A0000;color:#FF6B6B}
.badge-pronto{background:#004A1A;color:#5EFF8C}
.linha-item{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)}
.linha-item:last-of-type{border:none}
.linha-total{display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:var(--dourado2);padding:8px 0 0;border-top:1px solid var(--border);margin-top:4px}
.total-geral-box{background:var(--medio);border:2px solid var(--dourado);border-radius:12px;padding:14px;margin-top:16px;display:flex;justify-content:space-between;align-items:center}
.total-geral-label{font-size:14px;color:var(--muted)}
.total-geral-valor{font-size:24px;font-weight:700;color:var(--dourado2)}
.pedido-pendente{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.pedido-pendente-header{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.obs-input{width:100%;padding:10px;background:var(--superficie);border:1px solid var(--border);border-radius:10px;color:var(--texto);font-size:13px;resize:none;outline:none;margin-top:8px}
.obs-input:focus{border-color:var(--dourado)}
.obs-input::placeholder{color:#7a5030}
.btn-confirmar{width:100%;padding:14px;background:var(--fogo);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px}
.btn-confirmar:hover{background:var(--fogo2)}
.btn-limpar{width:100%;padding:10px;background:var(--superficie);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;cursor:pointer;margin-top:6px}
.btn-limpar:hover{border-color:var(--fogo);color:var(--fogo)}
.empty-state{text-align:center;padding:2rem;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:.5rem}
.pedido-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.pedido-num{font-size:11px;color:var(--muted);margin-bottom:4px}
.pedido-cliente{font-size:16px;font-weight:700;color:var(--texto)}
.pedido-itens{margin:10px 0;padding:10px;background:var(--superficie);border-radius:8px}
.pedido-item{font-size:13px;color:var(--texto);padding:3px 0;display:flex;gap:8px}
.pedido-item .qty{color:var(--dourado2);font-weight:700;min-width:24px}
.pedido-obs{font-size:12px;color:var(--muted);margin-top:6px;font-style:italic}
.btn-status{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.btn-fazer{background:#4A0000;color:#FF6B6B;border:1px solid #FF6B6B}
.btn-fazer:hover{background:#7A0000}
.btn-pronto{background:#004A1A;color:#5EFF8C;border:1px solid #5EFF8C}
.btn-pronto:hover{background:#006A22}
.pedido-actions{display:flex;gap:8px;margin-top:10px}
.fila-info{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;gap:20px}
.fila-stat{text-align:center}
.fila-n{font-size:22px;font-weight:700;color:var(--dourado2)}
.fila-l{font-size:11px;color:var(--muted)}
.caixa-stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:16px}
.caixa-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.caixa-stat:hover{border-color:var(--dourado);background:var(--medio)}
.caixa-stat.ativo{border-color:var(--dourado2);background:var(--medio);box-shadow:0 0 0 2px var(--dourado)}
.caixa-stat .val{font-size:22px;font-weight:700;color:var(--dourado2)}
.caixa-stat .lbl{font-size:11px;color:var(--muted);margin-top:4px}
.filtro-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filtro-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--superficie);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.filtro-chip.ativo{background:var(--fogo);border-color:var(--fogo);color:#fff}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.hist-nome{font-size:14px;font-weight:700;color:var(--texto)}
.hist-pgto{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--superficie);color:var(--muted)}
.hist-pgto.pix{background:#0d2b1a;color:#5EFF8C}
.hist-pgto.dinheiro{background:#2b1a0d;color:#F0C040}
.hist-pgto.debito{background:#0d1a2b;color:#6BB8FF}
.hist-pgto.credito{background:#1a0d2b;color:#CF9FFF}
.date-input{padding:9px 12px;background:var(--superficie);border:1px solid var(--border);border-radius:10px;color:var(--texto);font-size:13px;outline:none;width:100%}
.date-input:focus{border-color:var(--dourado)}
.cliente-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.2s}
.cliente-row:hover{border-color:var(--dourado)}
.cliente-row-top{display:flex;justify-content:space-between;align-items:center}
.cliente-rname{font-size:15px;font-weight:600;color:var(--texto)}
.cliente-rval{font-size:15px;font-weight:700;color:var(--dourado2)}
.cliente-rsub{font-size:12px;color:var(--muted);margin-top:4px}
.tag-pago{background:#004A1A;color:#5EFF8C;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--medio);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;color:var(--dourado2);margin-bottom:1rem}
.btn-fechar{width:100%;padding:10px;background:var(--superficie);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;margin-top:12px}
.btn-pagar{width:100%;padding:12px;background:var(--fogo);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.hidden{display:none!important}
.screen{display:none}
.screen.active{display:block}
.toast-notif{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1a4d2e;color:#5EFF8C;border:1.5px solid #5EFF8C;border-radius:14px;padding:14px 22px;font-size:16px;font-weight:700;z-index:999;box-shadow:0 4px 24px rgba(0,0,0,.5);transition:transform .35s cubic-bezier(.22,1,.36,1);pointer-events:none;white-space:nowrap}
.toast-notif.show{transform:translateX(-50%) translateY(0)}
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.prod-img{width:56px;height:56px;border-radius:8px;object-fit:cover;background:var(--superficie);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:14px;font-weight:700;color:var(--texto);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-desc{font-size:12px;color:var(--muted);margin-top:2px}
.prod-price{font-size:13px;font-weight:700;color:var(--dourado2);margin-top:4px}
.prod-actions{display:flex;flex-direction:column;gap:6px}
.btn-edit{padding:5px 10px;background:var(--medio);border:1px solid var(--border);border-radius:7px;color:var(--texto);font-size:12px;cursor:pointer}
.btn-del{padding:5px 10px;background:#3d0a0a;border:1px solid #7a1a1a;border-radius:7px;color:#ff6b6b;font-size:12px;cursor:pointer}
.btn-add-prod{width:100%;padding:13px;background:var(--fogo);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:14px}
.modal-prod-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-prod-box{background:var(--medio);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:100%;max-width:360px;max-height:90vh;overflow-y:auto}
.form-label{font-size:12px;color:var(--muted);margin-bottom:4px;display:block}
.form-input{width:100%;padding:11px;background:var(--superficie);border:1px solid var(--border);border-radius:10px;color:var(--texto);font-size:14px;outline:none;margin-bottom:10px}
.form-input:focus{border-color:var(--dourado)}
.foto-preview{width:100%;height:120px;border-radius:10px;background:var(--superficie);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden;cursor:pointer;position:relative}
.foto-preview img{width:100%;height:100%;object-fit:cover}
.foto-preview span{color:var(--muted);font-size:13px}
.btn-salvar{width:100%;padding:13px;background:var(--fogo);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-cancelar{width:100%;padding:10px;background:var(--superficie);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;margin-top:8px}
.btn-fechar-conta{width:100%;padding:14px;background:#1a4d2e;border:2px solid #5EFF8C;border-radius:12px;color:#5EFF8C;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:background .2s}
.btn-fechar-conta:hover{background:#0f3320}
.pgto-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.pgto-btn{padding:14px 8px;background:var(--superficie);border:2px solid var(--border);border-radius:12px;color:var(--texto);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.pgto-btn.selected{background:var(--medio);border-color:var(--dourado);color:var(--dourado2)}
.tipo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.tipo-btn{padding:12px 6px;background:var(--superficie);border:2px solid var(--border);border-radius:12px;color:var(--texto);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.tipo-btn.selected{background:var(--medio);border-color:var(--fogo);color:var(--dourado2)}
.tipo-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px}
.tipo-local{background:#1a2b4d;color:#6BB8FF}
.tipo-entrega{background:#2b1a00;color:#F0C040}
.tipo-viagem{background:#1a1a0d;color:#b0b060}
.card-entrega{background:#3d2800!important;border:2px solid #F0C040!important}
.card-entrega .comanda-nome,.card-entrega .pedido-cliente{color:#F0C040!important;font-size:16px!important}
.card-entrega .pedido-num{font-size:14px!important}
.card-viagem{background:#1e2800!important;border:2px solid #9acd32!important}
.card-viagem .comanda-nome,.card-viagem .pedido-cliente{color:#9acd32!important;font-size:16px!important}
.card-viagem .pedido-num{font-size:14px!important}
.tipo-badge-lg{display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:800;padding:5px 12px;border-radius:20px;margin-bottom:6px}
.data-filtro-caixa{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--dourado);border-radius:12px;padding:10px 14px;margin-bottom:14px}
.data-filtro-caixa input{background:transparent;border:none;color:var(--dourado2);font-size:15px;font-weight:700;outline:none;cursor:pointer;flex:1}
.endereco-box{background:var(--superficie);border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:8px}
.endereco-box input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--texto);font-size:13px;padding:6px 0;margin-bottom:6px;outline:none}
.endereco-box input::placeholder{color:var(--muted)}
.solicit-card{background:#0d2b1a;border:2px solid #5EFF8C;border-radius:14px;padding:14px;margin-bottom:12px;position:relative}
.solicit-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.solicit-nome{font-size:15px;font-weight:700;color:#5EFF8C}
.solicit-pgto{font-size:12px;font-weight:700;background:#1a4d2e;color:#5EFF8C;padding:3px 10px;border-radius:20px}
.solicit-mesa{font-size:12px;color:var(--muted);margin-bottom:8px}
.badge-notif{display:inline-block;background:var(--fogo);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:2px 6px;margin-left:6px;vertical-align:middle;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<!-- TELA DE CONFIGURAÇÃO FIREBASE -->
<!-- TELA DE LOADING -->
<div id="fbLoadingScreen" style="display:flex;position:fixed;inset:0;background:var(--escuro);z-index:9998;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="font-size:56px;animation:spin 1s linear infinite">🔥</div>
  <div style="font-size:16px;font-weight:700;color:var(--dourado2)">O Quintal na Brasa</div>
  <div style="font-size:13px;color:var(--muted)" id="fbLoadingMsg">Conectando ao banco de dados...</div>
</div>
<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>

<div class="app" id="app">

<!-- LOGIN -->

<script>
// ── FIREBASE ────────────────────────────────────────────────────────────
let db = null;

// Dados reativos — preenchidos pelos listeners do Firebase
let CARDAPIO  = [];
let PEDIDOS   = [];
let CATEGORIAS= [];
let SOLICITACOES = [];
let CLIENTES  = {}; // { celular: nome }
let pedidoIdSeq  = 1;
let clienteIdSeq = 1;

const CARDAPIO_INICIAL = [
  {id:'p1',nome:'Espeto Misto',desc:'Carne + frango temperados',preco:5,cat:'misto',emoji:'🍢'},
  {id:'p2',nome:'Espeto Só Carne',desc:'Carne bovina temperada',preco:5,cat:'carne',emoji:'🥩'},
  {id:'p3',nome:'Espeto Só Frango',desc:'Frango marinado no alho',preco:5,cat:'frango',emoji:'🍗'},
  {id:'p4',nome:'Completo c/ Acompanhamentos',desc:'Espeto + baião + farofa + salada + macarrão',preco:10,cat:'misto',emoji:'🍽️'},
  {id:'p5',nome:'Baião de Dois',desc:'Porção individual',preco:4,cat:'misto',emoji:'🫘'},
  {id:'p6',nome:'Farofa',desc:'Farofa temperada da casa',preco:3,cat:'misto',emoji:'🌽'},
  {id:'p7',nome:'Guaraná 2L',desc:'Refrigerante gelado',preco:8,cat:'bebida',emoji:'🥤'},
  {id:'p8',nome:'Grape 2L',desc:'Refrigerante uva gelado',preco:8,cat:'bebida',emoji:'🍇'},
  {id:'p9',nome:'Água 500ml',desc:'Garrafa gelada',preco:3,cat:'bebida',emoji:'💧'},
];
const CATEGORIAS_INICIAIS = [
  {id:'misto', nome:'Misto'},
  {id:'carne', nome:'Só Carne'},
  {id:'frango', nome:'Só Frango'},
  {id:'bebida', nome:'Bebidas'},
];

// ── Helpers Firebase ─────────────────────────────────────────────────────
function fbKey(){ return db.ref().push().key; }

function fbSet(path, data){ return db.ref(path).set(data); }
function fbUpdate(path, data){ return db.ref(path).update(data); }
function fbRemove(path){ return db.ref(path).remove(); }

// Converte snapshot do Firebase para array, adicionando a chave como .fbKey
function snap2arr(snapshot){
  if(!snapshot.exists()) return [];
  return Object.entries(snapshot.val()).map(([k,v])=>({...v, fbKey:k}));
}

// ── Inicialização ────────────────────────────────────────────────────────
function iniciarFirebase(cfg){
  try{
    if(firebase.apps.length) firebase.app().delete();
  }catch(e){}

  try{
    firebase.initializeApp(cfg);
    db = firebase.database();
  }catch(e){
    document.getElementById('fbLoadingMsg').textContent='❌ Erro: '+e.message;
    return;
  }

  document.getElementById('fbLoadingScreen').style.display='flex';
  document.getElementById('fbLoadingMsg').textContent='Autenticando...';

  // Login anônimo automático — cria token invisível para proteger o banco
  firebase.auth().signInAnonymously()
    .then(()=>{
      document.getElementById('fbLoadingMsg').textContent='Conectando ao banco de dados...';
      registrarListeners();
    })
    .catch(e=>{
      document.getElementById('fbLoadingMsg').textContent='❌ Erro de autenticação: '+e.message;
    });
}

function registrarListeners(){
  let abriu=false;
  function abrirApp(){
    if(abriu) return;
    abriu=true;
    document.getElementById('fbLoadingScreen').style.display='none';
  }

  // Abre em até 8s independente do que acontecer
  setTimeout(abrirApp, 8000);

  // CARDÁPIO
  db.ref('cardapio').on('value', snap=>{
    CARDAPIO = snap.exists() ? snap2arr(snap) : [];
    if(!snap.exists()){
      const upd={};
      CARDAPIO_INICIAIS.forEach(p=>{ upd[p.id]=p; });
      fbSet('cardapio', upd);
    }
    if(roleAtual==='cliente') renderCardapio();
    if(abaCaixaAtiva==='cardapio') renderCardapioCaixa();
    abrirApp();
  }, err=>{ console.error('cardapio',err); abrirApp(); });

  // CATEGORIAS
  db.ref('categorias').on('value', snap=>{
    CATEGORIAS = snap.exists() ? snap2arr(snap) : [];
    if(!snap.exists()){
      const upd={};
      CATEGORIAS_INICIAIS.forEach(c=>{ upd[c.id]=c; });
      fbSet('categorias', upd);
    }
    renderCatBtns();
    abrirApp();
  }, err=>{ console.error('categorias',err); abrirApp(); });

  // PEDIDOS
  db.ref('pedidos').on('value', snap=>{
    PEDIDOS = snap.exists() ? snap2arr(snap) : [];
    if(PEDIDOS.length>0){
      const maxId=Math.max(...PEDIDOS.map(p=>typeof p.id==='number'?p.id:0));
      pedidoIdSeq=maxId+1;
    }
    if(roleAtual==='cliente'){ renderComanda(); verificarNotificacoes(); }
    if(roleAtual==='churrasqueiro') renderChurrasqueiro();
    if(roleAtual==='caixa'){ renderCaixa(); atualizarBadgeCaixa(); }
    abrirApp();
  }, err=>{ console.error('pedidos',err); abrirApp(); });

  // SOLICITAÇÕES
  db.ref('solicitacoes').on('value', snap=>{
    SOLICITACOES = snap.exists() ? snap2arr(snap) : [];
    atualizarBadgeCaixa();
    if(roleAtual==='caixa'&&abaCaixaAtiva==='clientes') renderCaixaClientes();
    abrirApp();
  }, err=>{ console.error('solicitacoes',err); abrirApp(); });

  // CLIENTES (mapa celular→nome para login rápido)
  db.ref('clientes').on('value', snap=>{
    CLIENTES = snap.exists() ? snap.val() : {};
    abrirApp();
  }, err=>{ console.error('clientes',err); abrirApp(); });
}

function verificarNotificacoes(){
  if(roleAtual!=='cliente') return;
  const prontos=PEDIDOS.filter(p=>p.clienteId===clienteIdAtual&&p.status==='pronto');
  prontos.forEach(p=>{
    if(!_jaNotificados.has(p.id)){
      _jaNotificados.add(p.id);
      mostrarToast('🍢 Pedido #'+p.id+' pronto! Pode retirar.');
    }
  });

function formatarCelular(input){
  let v=input.value.replace(/\D/g,'');
  if(v.length>11) v=v.slice(0,11);
  if(v.length>6) v=`(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  else if(v.length>2) v=`(${v.slice(0,2)}) ${v.slice(2)}`;
  else if(v.length>0) v=`(${v}`;
  input.value=v;
  // Preenche nome automaticamente se celular já cadastrado
  const cel=v.replace(/\D/g,'');
  if(cel.length>=10 && CLIENTES[cel]){
    const nomeInput=document.getElementById('nomeInput');
    if(nomeInput && !nomeInput.value) nomeInput.value=CLIENTES[cel];
  }
}

function mostrarToast(msg){
  let t=document.getElementById('toastNotif');
  if(!t){
    t=document.createElement('div');
    t.id='toastNotif';
    t.className='toast-notif';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.classList.add('show');
  // beep
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.setValueAtTime(880,ctx.currentTime);
    o.frequency.linearRampToValueAtTime(1047,ctx.currentTime+0.12);
    g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.35);
    o.start();o.stop(ctx.currentTime+0.35);
  }catch(e){}
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.classList.remove('show'),4000);
}

  const ids={Dinheiro:'pgto-dinheiro',Pix:'pgto-pix',Débito:'pgto-debito',Crédito:'pgto-credito'};

}

function confirmarSolicitacao(){
  if(!_pgtoSelecionado){alert('Selecione a forma de pagamento!');return;}
  const meusPedidos=PEDIDOS.filter(p=>p.clienteId===clienteIdAtual&&!p.pago);
  const itensTodos=[];
  meusPedidos.forEach(p=>p.itens.forEach(i=>itensTodos.push(i)));
  if(qtdCarrinho()>0){
    Object.keys(carrinho).filter(k=>carrinho[k]>0).forEach(k=>{
      const it=CARDAPIO.find(i=>(i.fbKey||i.id)==k);
      if(it) itensTodos.push({nome:it.nome,qty:carrinho[k],preco:it.preco});
    });
  }
  const total=itensTodos.reduce((s,i)=>s+i.preco*i.qty,0);
  const agora=new Date();
  const hora=agora.getHours().toString().padStart(2,'0')+':'+agora.getMinutes().toString().padStart(2,'0');
  const sol={clienteId:clienteIdAtual,nome:clienteNome,mesa:clienteMesa,itens:itensTodos,total,pagamento:_pgtoSelecionado,hora};
  fbSet('solicitacoes/'+clienteIdAtual, sol);
  document.getElementById('modalPgtoOverlay').remove();
  renderComanda();
}

function fazerPedido(){
  const keys=Object.keys(carrinho).filter(k=>carrinho[k]>0);
  if(keys.length===0) return;

  // Salva endereço se preenchido no form inline
  if(_tipoPedido==='entrega'){
    _enderecoEntrega={
      rua:document.getElementById('endRua')?.value||_enderecoEntrega.rua||'',
      bairro:document.getElementById('endBairro')?.value||_enderecoEntrega.bairro||'',
      ref:document.getElementById('endRef')?.value||_enderecoEntrega.ref||''
    };
    if(!_enderecoEntrega.rua){alert('Informe o endereço de entrega!');return;}
  }

  const itens=keys.map(k=>{
    const it=CARDAPIO.find(i=>(i.fbKey||i.id)==k);
    if(!it){console.warn('Item não encontrado:',k);return null;}
    return{nome:it.nome,qty:carrinho[k],preco:it.preco};
  }).filter(Boolean);

  if(itens.length===0){alert('Erro ao montar pedido. Tente novamente.');return;}

  const obs=document.getElementById('obsInput')?document.getElementById('obsInput').value:'';
  const agora=new Date();
  const hora=agora.getHours().toString().padStart(2,'0')+':'+agora.getMinutes().toString().padStart(2,'0');
  const dia=agora.getDate().toString().padStart(2,'0');
  const mes=(agora.getMonth()+1).toString().padStart(2,'0');
  const ano=agora.getFullYear();
  const data=`${dia}-${mes}-${ano}`;
  const key=fbKey();
  const pedido={
    id:pedidoIdSeq++,
    clienteId:clienteIdAtual,
    cliente:clienteNome,
    celular:clienteCelular||'',
    mesa:clienteMesa,
    itens,
    status:'aguardando',
    obs,
    hora,
    data,
    pago:false,
    tipo:_tipoPedido,
    endereco:_tipoPedido==='entrega'?{..._enderecoEntrega}:null
  };
  fbSet('pedidos/'+key, pedido).catch(e=>alert('Erro ao enviar pedido: '+e.message));
  carrinho={};
  renderComanda();
  atualizarTotalBar();
}

function limparCarrinho(){

  renderComanda();
  atualizarTotalBar();
}

  document.getElementById('filaInfo').innerHTML=`

  const mapa={fila:ag,fazendo:fa,prontos:pr};

    const dataFiltro=_filtroDataProntos||hojeStr;

      <div style="display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px">

          style="flex:1;background:transparent;border:none;color:var(--dourado2);font-size:14px;font-weight:700;outline:none;cursor:pointer">
        ${_filtroDataProntos&&_filtroDataProntos!==hojeStr?`<button onclick="filtrarDataProntos('')" style="font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;white-space:nowrap">Hoje</button>`:''}
      </div>`;

function filtrarDataProntos(inputVal){
  if(!inputVal){
    _filtroDataProntos=''; // volta para hoje (padrão)
  } else {
    const [ano,mes,dia]=inputVal.split('-');
    _filtroDataProntos=`${dia}-${mes}-${ano}`;
  }
  renderChurrasqueiro();
}

function mudarStatus(id,novoStatus){
  id=Number(id); // garante que é número para comparação
  if(novoStatus==='fazendo'){
    const fila=PEDIDOS.filter(p=>p.status==='aguardando').sort((a,b)=>a.id-b.id);
    const primeiro=fila[0];
    if(primeiro && primeiro.id !== id){
      const pedidoAtual=PEDIDOS.find(x=>x.id===id);
      const ignorar=confirm(
        `⚠️ Atenção — fora de ordem!\n\n`+
        `Pedido #${primeiro.id} (${primeiro.hora}) de ${primeiro.cliente} foi solicitado antes.\n\n`+
        `Tem certeza que quer começar o pedido #${pedidoAtual?.id} de ${pedidoAtual?.cliente} primeiro?\n\n`+
        `OK para confirmar ou Cancelar para respeitar a fila.`
      );
      if(!ignorar) return;
    }
  }
  const p=PEDIDOS.find(x=>Number(x.id)===id);
  if(p&&p.fbKey){
    fbUpdate('pedidos/'+p.fbKey,{status:novoStatus});
  }
}

function renderCaixa(){

  const pedidosData=PEDIDOS.filter(p=>p.data===dataRef);

  const clienteIds=[...new Set(pedidosData.map(p=>p.clienteId))];

  else if(_filtroResumo==='fechado'){ lista=lista.filter(p=>p.pago); rodapeLbl='Total pago'; rodapeVal=totalPago; }

  // Entregas em aberto do dia
  const entregas=pedidosData.filter(p=>p.tipo==='entrega'&&!p.pago);

  document.getElementById('caixaResumo').innerHTML=`
    <div class="data-filtro-caixa">
      <span style="font-size:13px;color:var(--muted);white-space:nowrap">📅 Data:</span>
      <input type="date" value="${inputVal}" onchange="mudarDataCaixa(this.value)">
      ${dataRef!==hojeStr?`<button onclick="mudarDataCaixa('')" style="font-size:11px;color:var(--fogo2);background:none;border:none;cursor:pointer;white-space:nowrap">Hoje</button>`:'<span style="font-size:11px;color:#5EFF8C">Hoje</span>'}
    </div>
    <div class="caixa-stat-grid">
      <div class="caixa-stat${_filtroResumo===null?' ativo':''}" onclick="filtroResumo(null)">
        <div class="val">R$&nbsp;${totalAberto.toFixed(2).replace('.',',')}</div><div class="lbl">Em aberto</div>
      </div>
      <div class="caixa-stat${_filtroResumo==='pago'?' ativo':''}" onclick="filtroResumo('pago')">
        <div class="val" style="color:#5EFF8C">R$&nbsp;${totalPago.toFixed(2).replace('.',',')}</div><div class="lbl">Já pago</div>

  if(_filtroResumo!==null){

let _pgtoCaixaSelecionado=null;
function selecionarPgtoCaixa(forma){
  _pgtoCaixaSelecionado=forma;
  document.querySelectorAll('#modalFechaCaixaOverlay .pgto-btn').forEach(b=>b.classList.remove('selected'));
  const ids={Dinheiro:'fcx-dinheiro',Pix:'fcx-pix',Débito:'fcx-debito',Crédito:'fcx-credito'};
  const el=document.getElementById(ids[forma]);
  if(el) el.classList.add('selected');
}

function confirmarFecharComandaCaixa(clienteId){
  if(!_pgtoCaixaSelecionado){alert('Selecione a forma de pagamento!');return;}
  const agora=new Date();
  const dataFecha=agora.toISOString().slice(0,10);
  const pedidosCliente=PEDIDOS.filter(p=>p.clienteId===clienteId&&!p.pago);
  const nomeCliente=pedidosCliente[0]?.cliente||PEDIDOS.find(p=>p.clienteId===clienteId)?.cliente||'';
  pedidosCliente.forEach(p=>{
    if(p.fbKey) fbUpdate('pedidos/'+p.fbKey,{pago:true,pagamento:_pgtoCaixaSelecionado,dataFecha});
  });
  // Salva nome do cliente para login futuro e remove pedidos após pequeno delay
  if(nomeCliente && clienteId) fbSet('clientes/'+clienteId, nomeCliente);
  // Remove pedidos pagos após salvar no histórico
  setTimeout(()=>{
    PEDIDOS.filter(p=>p.clienteId===clienteId&&p.pago).forEach(p=>{
      if(p.fbKey) fbRemove('pedidos/'+p.fbKey);
    });
  }, 500);
  fbRemove('solicitacoes/'+clienteId);
  document.getElementById('modalFechaCaixaOverlay')?.remove();
  _pgtoCaixaSelecionado=null;
  const nome=nomeCliente||'cliente';
  mostrarToast('✅ Comanda de '+nome+' fechada!');
}

function abrirModalProduto(id){
  _prodEditId = id;
  _fotoBase64 = null;
  const p = id ? CARDAPIO.find(x=>x.id===id) : null;
  const overlay = document.createElement('div');
  overlay.className = 'modal-prod-overlay';
  overlay.id = 'modalProdOverlay';

      <label class="form-label">Preço (R$)</label>
      <input class="form-input" id="fpPreco" type="number" step="0.50" min="0" placeholder="5.00" value="${p?p.preco:''}">

      </select>
      <label class="form-label">Emoji (fallback sem foto)</label>
      <input class="form-input" id="fpEmoji" placeholder="🍢" value="${p?p.emoji||'🍢':'🍢'}">
      <label class="form-label">Foto do produto</label>
      <div class="foto-preview" id="fpFotoPreview" onclick="document.getElementById('fpFotoInput').click()">
        ${(p&&p.foto)?`<img src="${p.foto}" alt="foto">`:`<span>📷 Toque para adicionar foto</span>`}
      </div>
      <input type="file" id="fpFotoInput" accept="image/*" style="display:none" onchange="onFotoChange(event)">
      <button class="btn-salvar" onclick="salvarProduto()">💾 Salvar</button>
      <button class="btn-cancelar" onclick="fecharModalProduto()">Cancelar</button>
    </div>`;
  document.body.appendChild(overlay);
  // pre-load existing photo
  if(p && p.foto) _fotoBase64 = p.foto;
}

function onFotoChange(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    _fotoBase64 = ev.target.result;
    const prev = document.getElementById('fpFotoPreview');
    prev.innerHTML = `<img src="${_fotoBase64}" alt="foto">`;
  };
  reader.readAsDataURL(file);
}

function salvarProduto(){
  const nome = document.getElementById('fpNome').value.trim();
  const desc = document.getElementById('fpDesc').value.trim();
  const preco = parseFloat(document.getElementById('fpPreco').value);
  const cat = document.getElementById('fpCat').value||CATEGORIAS[0]?.id||'misto';
  const emoji = document.getElementById('fpEmoji').value.trim()||'🍢';
  if(!nome){alert('Digite o nome do produto!');return;}
  if(isNaN(preco)||preco<0){alert('Preço inválido!');return;}
  if(_prodEditId){
    // Edição — encontra fbKey do produto
    const p=CARDAPIO.find(x=>x.id===_prodEditId);
    const fbk=p?.fbKey||_prodEditId;
    const upd={id:_prodEditId,nome,desc,preco,cat,emoji};
    if(_fotoBase64) upd.foto=_fotoBase64;
    else if(p?.foto) upd.foto=p.foto;
    fbSet('cardapio/'+fbk, upd);
  } else {
    const key=fbKey();
    const prod={id:key,nome,desc,preco,cat,emoji};
    if(_fotoBase64) prod.foto=_fotoBase64;
    fbSet('cardapio/'+key, prod);
  }
  fecharModalProduto();
}

function excluirProduto(id){
  const p=CARDAPIO.find(x=>x.id===id);
  if(!confirm(`Excluir "${p?.nome}"?`)) return;
  const fbk=p?.fbKey||id;
  fbRemove('cardapio/'+fbk);
}

function fecharModalProduto(){
  const el = document.getElementById('modalProdOverlay');
  if(el) el.remove();
  _fotoBase64 = null;
  _prodEditId = null;
}

function aplicarFiltroHist(){
  const ini=document.getElementById('histDtIni')?.value||'';
  const fim=document.getElementById('histDtFim')?.value||'';
  _histFiltroData={ini,fim};

  // Agrupa por cliente (clienteId único)
  const clienteIds=[...new Set(PEDIDOS.filter(p=>p.pago).map(p=>p.clienteId))];
  let grupos=clienteIds.map(cid=>{
    const peds=PEDIDOS.filter(p=>p.clienteId===cid&&p.pago);
    const dataFecha=peds[0]?.dataFecha||'';
    const pagamento=peds[0]?.pagamento||'—';
    const total=peds.reduce((s,p)=>s+p.itens.reduce((ss,i)=>ss+i.preco*i.qty,0),0);
    const itens=[];
    peds.forEach(p=>p.itens.forEach(i=>itens.push(i)));
    return {cid,nome:peds[0].cliente,mesa:peds[0].mesa,hora:peds[peds.length-1].hora,dataFecha,pagamento,total,itens,peds};
  });

  // Filtro data
  if(ini) grupos=grupos.filter(g=>g.dataFecha>=ini);
  if(fim) grupos=grupos.filter(g=>g.dataFecha<=fim);
  // Filtro pagamento
  if(_histFiltroPgto!=='todos') grupos=grupos.filter(g=>g.pagamento===_histFiltroPgto);

  // Ordena por data desc depois hora desc
  grupos.sort((a,b)=>(b.dataFecha+b.hora).localeCompare(a.dataFecha+a.hora));

  const totalGeral=grupos.reduce((s,g)=>s+g.total,0);
  const cont=document.getElementById('histLista');

  if(grupos.length===0){
    cont.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><p>Nenhum registro encontrado.</p></div>`;
    document.getElementById('caixaRodape').classList.add('hidden');
    return;
  }

  const pgtoClass={'Dinheiro':'dinheiro','Pix':'pix','Débito':'debito','Crédito':'credito'};

  cont.innerHTML=grupos.map(g=>`
    <div class="hist-card">
      <div class="hist-header">
        <span class="hist-nome">👤 ${g.nome}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="hist-pgto ${pgtoClass[g.pagamento]||''}">${g.pagamento}</span>
          <button onclick="excluirHistorico('${g.cid}','${g.dataFecha}')" style="background:#3d0a0a;border:1px solid #7a1a1a;border-radius:7px;color:#ff6b6b;font-size:12px;cursor:pointer;padding:3px 8px" title="Excluir registro">🗑️</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${g.dataFecha?g.dataFecha.split('-').reverse().join('/'):'s/data'} · ${g.hora}</div>
      <div style="margin-bottom:6px">
        ${g.itens.map(i=>`<div class="linha-item" style="font-size:13px"><span>${i.qty}x ${i.nome}</span><span style="color:var(--dourado2)">R$ ${(i.preco*i.qty).toFixed(2).replace('.',',')}</span></div>`).join('')}
      </div>
      <div class="linha-total"><span>Total</span><span style="color:var(--dourado2);font-weight:700">R$ ${g.total.toFixed(2).replace('.',',')}</span></div>
    </div>`).join('');

  // Rodapé
  document.getElementById('caixaRodape').classList.remove('hidden');
  document.getElementById('caixaRodapeLbl').textContent=`${grupos.length} conta${grupos.length!==1?'s':''} fechada${grupos.length!==1?'s':''}`;
  document.getElementById('caixaRodapeVal').textContent='R$ '+totalGeral.toFixed(2).replace('.',',');
}

function filtroHistPgto(pgto){
  _histFiltroPgto=pgto;
  renderHistorico();
}

function limparFiltroHist(){
  _histFiltroData={ini:'',fim:''};
  _histFiltroPgto='todos';
  renderHistorico();
}
function excluirHistorico(clienteId, dataFecha){
  const nome=PEDIDOS.find(p=>p.clienteId===clienteId)?.cliente||'este cliente';
  const confirmar=confirm(`⚠️ Tem certeza que deseja excluir o registro de "${nome}"?\n\nEsta ação não poderá ser desfeita e o pedido não será mais visualizado no histórico.`);
  if(!confirmar) return;
  // Remove todos os pedidos pagos deste cliente com esta dataFecha
  PEDIDOS.filter(p=>p.clienteId===clienteId&&p.pago&&(p.dataFecha===dataFecha||!p.dataFecha&&!dataFecha)).forEach(p=>{
    if(p.fbKey) fbRemove('pedidos/'+p.fbKey);
  });
  mostrarToast('🗑️ Registro excluído do histórico.');
}
