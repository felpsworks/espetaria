<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0E0807" />
  <meta name="description" content="O Quintal na Brasa — peça online de forma rápida e acompanhe seu pedido em tempo real." />
  <title>O Quintal na Brasa — Peça Online</title>

  <!-- Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       DESIGN TOKENS
       ============================================================ */
    :root {
      /* Cores — brasa sobre carvão */
      --ink-950: #08050400;
      --ink-900: #0E0807;
      --ink-800: #1A0F0B;
      --ember-700: #3D1F15;
      --ember-600: #5C2F1F;
      --fire-600: #E84610;
      --fire-500: #FF6B1A;
      --fire-400: #FF8A3D;
      --fire-glow: rgba(255, 107, 26, 0.45);
      --coal-red: #C9302C;
      --cream-100: #F5E6D3;
      --cream-200: rgba(245, 230, 211, 0.82);
      --cream-300: rgba(245, 230, 211, 0.58);
      --cream-400: rgba(245, 230, 211, 0.38);

      /* Glass */
      --glass-bg: rgba(255, 240, 220, 0.035);
      --glass-bg-strong: rgba(255, 240, 220, 0.055);
      --glass-border: rgba(255, 138, 61, 0.14);
      --glass-border-strong: rgba(255, 138, 61, 0.22);

      /* Raios e espaçamentos */
      --r-md: 16px;
      --r-lg: 20px;
      --r-xl: 24px;
      --r-pill: 999px;

      /* Sombras */
      --shadow-cta: 0 18px 40px -12px rgba(255, 107, 26, 0.55),
                    0 6px 16px -6px rgba(201, 48, 44, 0.45),
                    inset 0 1px 0 rgba(255, 255, 255, 0.18);
      --shadow-cta-hover: 0 26px 60px -14px rgba(255, 107, 26, 0.75),
                          0 10px 24px -8px rgba(201, 48, 44, 0.6),
                          inset 0 1px 0 rgba(255, 255, 255, 0.25);
      --shadow-card: 0 24px 60px -24px rgba(0, 0, 0, 0.7),
                     0 0 0 1px var(--glass-border);
      --shadow-logo: 0 12px 40px rgba(255, 107, 26, 0.25),
                     0 4px 14px rgba(0, 0, 0, 0.5);

      /* Easings */
      --ease-out-soft: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }

    /* ============================================================
       RESET
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--cream-100);
      background: var(--ink-900);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      line-height: 1.5;
      position: relative;
    }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }

    /* ============================================================
       BACKGROUND — degradê escuro + textura noise + brasas ambient
       ============================================================ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255, 107, 26, 0.12), transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(201, 48, 44, 0.10), transparent 60%),
        linear-gradient(180deg, #1A0F0B 0%, #0E0807 50%, #08040300 100%);
    }

    /* Brasas pulsando no fundo */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 18% 28%, rgba(255, 107, 26, 0.10) 0%, transparent 8%),
        radial-gradient(circle at 82% 72%, rgba(255, 138, 61, 0.08) 0%, transparent 9%),
        radial-gradient(circle at 75% 18%, rgba(201, 48, 44, 0.08) 0%, transparent 7%),
        radial-gradient(circle at 12% 80%, rgba(255, 107, 26, 0.06) 0%, transparent 8%);
      animation: emberPulse 9s ease-in-out infinite;
      pointer-events: none;
    }

    /* Textura noise via SVG */
    .noise {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.45;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.6 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    @keyframes emberPulse {
      0%, 100% { opacity: 1; transform: translateY(0); }
      50% { opacity: 0.7; transform: translateY(-6px); }
    }

    /* ============================================================
       LAYOUT
       ============================================================ */
    .app {
      max-width: 460px;
      margin: 0 auto;
      padding: 48px 24px 40px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    /* ============================================================
       HEADER — logo + slogan
       ============================================================ */
    .header {
      text-align: center;
      padding-top: 12px;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 138, 61, 0.18), transparent 60%),
        linear-gradient(160deg, #1F120D, #0A0605);
      box-shadow: var(--shadow-logo);
      position: relative;
      filter: drop-shadow(0 0 24px rgba(255, 107, 26, 0.3));
    }

    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: conic-gradient(from 210deg, transparent, rgba(255, 107, 26, 0.5), transparent 50%);
      z-index: -1;
      filter: blur(8px);
      opacity: 0.6;
    }

    .logo-wrap img,
    .logo-wrap svg {
      width: 88px;
      height: 88px;
      object-fit: contain;
    }

    .brand {
      margin: 22px 0 8px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--cream-100);
    }

    .brand .accent {
      background: linear-gradient(135deg, var(--fire-400) 0%, var(--coal-red) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .slogan {
      margin: 0;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cream-300);
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .slogan::before,
    .slogan::after {
      content: '';
      width: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--fire-500), transparent);
    }

    /* ============================================================
       CTA PRINCIPAL — "Fazer Pedido"
       ============================================================ */
    .cta-block {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .cta-primary {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 22px 28px;
      border-radius: var(--r-lg);
      background: linear-gradient(135deg, var(--fire-500) 0%, var(--fire-600) 50%, var(--coal-red) 100%);
      color: #FFFFFF;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: var(--shadow-cta);
      transition: transform 0.25s var(--ease-out-soft),
                  box-shadow 0.35s var(--ease-out-soft);
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    /* Brilho deslizante no hover */
    .cta-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.22), transparent);
      transition: left 0.7s var(--ease-out-soft);
      z-index: 0;
    }

    .cta-primary > * { position: relative; z-index: 1; }

    .cta-primary:hover {
      transform: translateY(-2px) scale(1.015);
      box-shadow: var(--shadow-cta-hover);
    }

    .cta-primary:hover::before { left: 120%; }

    .cta-primary:active {
      transform: translateY(0) scale(0.97);
      transition-duration: 0.08s;
    }

    .cta-primary .icon {
      width: 24px;
      height: 24px;
      animation: flameDance 2.4s ease-in-out infinite;
    }

    .cta-primary .arrow {
      width: 20px;
      height: 20px;
      transition: transform 0.3s var(--ease-out-soft);
    }

    .cta-primary:hover .arrow { transform: translateX(4px); }

    @keyframes flameDance {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      50%      { transform: scale(1.08) rotate(2deg); }
    }

    .cta-caption {
      font-size: 13px;
      color: var(--cream-300);
      text-align: center;
      line-height: 1.55;
      max-width: 320px;
      margin: 0;
    }

    .cta-caption .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--fire-500);
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 8px var(--fire-glow);
      animation: blinkLive 1.6s ease-in-out infinite;
    }

    @keyframes blinkLive {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ============================================================
       CARD DE INFORMAÇÕES — glassmorphism leve
       ============================================================ */
    .info-card {
      background: var(--glass-bg);
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(14px) saturate(120%);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      padding: 22px 24px;
      box-shadow: var(--shadow-card);
      position: relative;
    }

    .info-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20px;
      right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--fire-500), transparent);
      opacity: 0.4;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 10px 0;
    }

    .info-row + .info-row {
      border-top: 1px solid rgba(255, 240, 220, 0.05);
    }

    .info-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255, 107, 26, 0.18), rgba(201, 48, 44, 0.10));
      color: var(--fire-400);
    }

    .info-icon svg { width: 18px; height: 18px; }

    .info-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-top: 2px;
    }

    .info-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cream-400);
    }

    .info-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--cream-100);
      line-height: 1.4;
    }

    .info-value a:hover { color: var(--fire-400); }

    /* ============================================================
       REDES SOCIAIS
       ============================================================ */
    .social-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .social-label {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--cream-400);
      font-weight: 500;
    }

    .socials {
      display: flex;
      gap: 14px;
    }

    .social-btn {
      width: 52px;
      height: 52px;
      border-radius: var(--r-md);
      background: var(--glass-bg-strong);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--cream-100);
      transition: transform 0.3s var(--ease-out-soft),
                  background 0.3s ease,
                  border-color 0.3s ease,
                  box-shadow 0.3s ease;
      position: relative;
    }

    .social-btn svg { width: 22px; height: 22px; }

    .social-btn:hover {
      transform: translateY(-3px) scale(1.05);
    }

    .social-btn:active { transform: translateY(0) scale(0.95); }

    .social-btn.wa:hover {
      background: rgba(37, 211, 102, 0.12);
      border-color: rgba(37, 211, 102, 0.5);
      color: #25D366;
      box-shadow: 0 10px 24px -8px rgba(37, 211, 102, 0.5);
    }

    .social-btn.ig:hover {
      background: rgba(225, 48, 108, 0.12);
      border-color: rgba(225, 48, 108, 0.5);
      color: #E1306C;
      box-shadow: 0 10px 24px -8px rgba(225, 48, 108, 0.5);
    }

    /* ============================================================
       BOTÃO ADMIN — secundário discreto
       ============================================================ */
    .admin-btn {
      align-self: center;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--r-pill);
      background: rgba(255, 240, 220, 0.03);
      border: 1px solid rgba(255, 240, 220, 0.08);
      color: var(--cream-300);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    .admin-btn svg { width: 13px; height: 13px; }

    .admin-btn:hover {
      color: var(--fire-400);
      border-color: rgba(255, 138, 61, 0.3);
      background: rgba(255, 138, 61, 0.05);
    }

    .admin-btn:active { transform: scale(0.97); }

    /* ============================================================
       ENTRADA — stagger fade-in-up
       ============================================================ */
    .anim { opacity: 0; transform: translateY(18px); }

    .loaded .anim {
      animation: fadeInUp 0.8s var(--ease-out-soft) forwards;
    }

    .loaded .anim:nth-child(1) { animation-delay: 0ms; }
    .loaded .anim:nth-child(2) { animation-delay: 140ms; }
    .loaded .anim:nth-child(3) { animation-delay: 280ms; }
    .loaded .anim:nth-child(4) { animation-delay: 420ms; }
    .loaded .anim:nth-child(5) { animation-delay: 560ms; }
    .loaded .anim:nth-child(6) { animation-delay: 700ms; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0);   filter: blur(0); }
    }

    /* Logo entra com escala extra */
    .loaded .logo-wrap {
      animation: logoIn 1s var(--ease-out-soft) forwards;
    }

    @keyframes logoIn {
      0%   { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      60%  { opacity: 1; transform: scale(1.05); }
      100% { transform: scale(1); filter: blur(0); }
    }

    /* ============================================================
       RESPONSIVO
       ============================================================ */
    @media (max-width: 380px) {
      .app { padding: 36px 18px 32px; gap: 28px; }
      .logo-wrap { width: 112px; height: 112px; }
      .logo-wrap img, .logo-wrap svg { width: 74px; height: 74px; }
      .brand { font-size: 24px; }
      .cta-primary { padding: 20px 22px; font-size: 15px; }
    }

    @media (min-width: 768px) {
      .app { padding: 64px 28px 56px; gap: 44px; }
    }

    /* ============================================================
       MOTION REDUCIDA
       ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .anim { opacity: 1; transform: none; }
    }

    /* Foco visível para acessibilidade */
    a:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--fire-400);
      outline-offset: 3px;
      border-radius: var(--r-md);
    }
  </style>
</head>

    <!-- ============== REDES SOCIAIS ============== -->
    <section class="social-block anim" aria-label="Redes sociais">
